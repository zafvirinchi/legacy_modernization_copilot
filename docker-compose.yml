services:
  mongo:
    image: mongo:7
    container_name: ai-legacy-copilot-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
    container_name: ai-legacy-copilot-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MONGODB_HOST: mongo
      MONGODB_PORT: 27017
      MONGODB_DATABASE: ${MONGODB_DATABASE:-ai_legacy_modernization}
      JWT_SECRET: ${JWT_SECRET:-change-this-default-secret-in-production-it-must-be-at-least-64-bytes-long-for-hs512}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-admin123}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: ai-legacy-copilot-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080/api}
    ports:
      - "3000:3000"

volumes:
  mongo-data:
