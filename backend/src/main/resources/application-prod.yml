spring:
  data:
    mongodb:
      uri: mongodb+srv://${MONGODB_USER}:${MONGODB_PASSWORD}@${MONGODB_CLUSTER}/?retryWrites=true&w=majority
      auto-index-creation: false

logging:
  level:
    root: WARN
    com.ailegacy.modernization.copilot: INFO
    # org.springframework.security override intentionally removed for now: it
    # was more specific than application.yml's diagnostic org.springframework=DEBUG
    # and would have silenced exactly the security-bean startup logging this
    # investigation needs. Restore `org.springframework.security: WARN` here
    # once the Northflank startup hang is diagnosed and fixed.
  # No file appender in prod: platforms like Northflank capture stdout/stderr
  # directly, and a hardcoded /var/log path may not be writable in a locked-down
  # buildpack container - that would risk failing logging init at startup.

jwt:
  # No override here - falls back to application.yml's safe default so startup
  # never fails on a missing JWT_SECRET. Set JWT_SECRET explicitly in Northflank
  # for real production use; the default is dev-grade only.
  expiration-ms: 900000
  refresh-expiration-ms: 604800000

app:
  temp-directory: ${TEMP_UPLOAD_DIR:${java.io.tmpdir}/ai-legacy-copilot}
  output-directory: ${OUTPUT_DIR:${java.io.tmpdir}/ai-legacy-copilot/output}
