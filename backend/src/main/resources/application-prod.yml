spring:
  data:
    mongodb:
      uri: mongodb+srv://${MONGODB_USER}:${MONGODB_PASSWORD}@${MONGODB_CLUSTER}/?retryWrites=true&w=majority
      auto-index-creation: false

logging:
  level:
    root: WARN
    com.ailegacy.modernization.copilot: INFO
    org.springframework.security: WARN
  file:
    name: /var/log/ai-legacy-copilot/application.log

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 900000
  refresh-expiration-ms: 604800000

app:
  temp-directory: /var/ai-legacy-copilot/temp
  output-directory: /var/ai-legacy-copilot/output
