spring:
  data:
    mongodb:
      uri: mongodb://${MONGODB_HOST:mongo}:${MONGODB_PORT:27017}/${MONGODB_DATABASE:ai_legacy_modernization}
      auto-index-creation: false

logging:
  level:
    root: INFO
    com.ailegacy.modernization.copilot: DEBUG
  file:
    name: /var/log/ai-legacy-copilot/application.log

jwt:
  secret: ${JWT_SECRET:change-this-default-secret-in-production-it-must-be-at-least-64-bytes-long-for-hs512}
  expiration-ms: 900000
  refresh-expiration-ms: 604800000

app:
  temp-directory: /tmp/ai-legacy-copilot
  output-directory: ${OUTPUT_DIR:${java.io.tmpdir}/ai-legacy-copilot/output}
