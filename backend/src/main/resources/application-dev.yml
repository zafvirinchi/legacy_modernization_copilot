spring:
  data:
    mongodb:
      uri: mongodb+srv://testuser:testpass@localhost:27017/ai_legacy_modernization?ssl=false
      auto-index-creation: true

logging:
  level:
    root: INFO
    com.ailegacy.modernization.copilot: DEBUG
