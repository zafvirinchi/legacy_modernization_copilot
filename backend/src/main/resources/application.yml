spring:
  application:
    name: ai-legacy-modernization-copilot
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # MongoDB Configuration
  data:
    mongodb:
      uri: mongodb+srv://${MONGODB_USER}:${MONGODB_PASSWORD}@${MONGODB_CLUSTER}/?retryWrites=true&w=majority
      database: ${MONGODB_DATABASE:ai_legacy_modernization}
      # false by default: eager index creation connects to Mongo synchronously
      # during context startup and can fail the whole app if Mongo is briefly
      # unreachable. Individual profiles/entities can still opt back in.
      auto-index-creation: false
  
  # Jackson Configuration
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false
  
  # Servlet Configuration
  servlet:
    multipart:
      max-file-size: 1000MB
      max-request-size: 1000MB
  
  # Security Configuration
  security:
    user:
      name: admin
      password: ${APP_ADMIN_PASSWORD:admin123}

# Server Configuration
server:
  port: ${PORT:8080}
  # Explicit rather than relying on Spring Boot's default: bind every interface,
  # not just loopback, so the container's external load balancer (e.g. Northflank)
  # can actually reach the process.
  address: 0.0.0.0
  servlet:
    context-path: /api
  compression:
    enabled: true
    min-response-size: 1024

# Logging Configuration
logging:
  level:
    root: INFO
    com.ailegacy.modernization.copilot: DEBUG
    org.springframework.security: DEBUG
    org.springframework.data.mongodb: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:change-this-default-secret-in-production-it-must-be-at-least-64-bytes-long-for-hs512}
  expiration-ms: 900000  # 15 minutes (access token)
  refresh-expiration-ms: 604800000  # 7 days (refresh token)

# OpenAPI / Swagger Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    display-request-duration: true
    filter: false
    operations-sorter: method
  show-actuator: false

# LangChain4j Configuration
llm:
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:}
    model: ${OPENAI_MODEL:${LLM_MODEL:gpt-4}}
    temperature: ${LLM_TEMPERATURE:0.7}
    max-tokens: ${LLM_MAX_TOKENS:4096}
  azure:
    api-key: ${AZURE_OPENAI_API_KEY:}
    endpoint: ${AZURE_OPENAI_ENDPOINT:}
    model: ${AZURE_LLM_MODEL:gpt-4}
    deployment-id: ${AZURE_LLM_DEPLOYMENT_ID:}

# Application Configuration
app:
  name: AI Legacy Modernization Copilot
  version: 1.0.0
  max-upload-size-mb: 1000
  allowed-artifact-types: jar,war,xml,properties,gradle,maven,java
  temp-directory: ${TEMP_UPLOAD_DIR:${java.io.tmpdir}/ai-legacy-copilot}
  output-directory: ${OUTPUT_DIR:${java.io.tmpdir}/ai-legacy-copilot/output}
  frontend-url: ${FRONTEND_URL:}
  project:
    supported-extensions: java,jsp,xml,properties,sql,yaml,yml,cbl,jcl
    max-extracted-size-mb: ${MAX_EXTRACTED_SIZE_MB:2000}
  ai:
    max-digest-chars: ${AI_MAX_DIGEST_CHARS:60000}
    max-file-chars: ${AI_MAX_FILE_CHARS:6000}

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    # Don't let a temporarily unreachable MongoDB flip /actuator/health to DOWN -
    # the app itself is still up and able to serve requests that don't need Mongo.
    mongo:
      enabled: false
  metrics:
    export:
      prometheus:
        enabled: true
