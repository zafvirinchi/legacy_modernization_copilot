spring:
  application:
    name: ai-legacy-modernization-copilot
  profiles:
    active: dev
  
  # MongoDB Configuration
  data:
    mongodb:
      uri: mongodb+srv://${MONGODB_USER}:${MONGODB_PASSWORD}@${MONGODB_CLUSTER}/?retryWrites=true&w=majority
      database: ${MONGODB_DATABASE:ai_legacy_modernization}
      auto-index-creation: true
  
  # Jackson Configuration
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false
  
  # Servlet Configuration
  servlet:
    multipart:
      max-file-size: 1000MB
      max-request-size: 1000MB
  
  # Security Configuration
  security:
    user:
      name: admin
      password: ${APP_ADMIN_PASSWORD:admin123}

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
    min-response-size: 1024

# Logging Configuration
logging:
  level:
    root: INFO
    com.ailegacy.modernization.copilot: DEBUG
    org.springframework.security: DEBUG
    org.springframework.data.mongodb: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-environment}
  expiration-ms: 86400000  # 24 hours
  refresh-expiration-ms: 604800000  # 7 days

# OpenAPI / Swagger Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    display-request-duration: true
    filter: false
    operations-sorter: method
  show-actuator: false

# LangChain4j Configuration
llm:
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${LLM_MODEL:gpt-4}
    temperature: ${LLM_TEMPERATURE:0.7}
    max-tokens: ${LLM_MAX_TOKENS:4096}
  azure:
    api-key: ${AZURE_OPENAI_API_KEY:}
    endpoint: ${AZURE_OPENAI_ENDPOINT:}
    model: ${AZURE_LLM_MODEL:gpt-4}
    deployment-id: ${AZURE_LLM_DEPLOYMENT_ID:}

# Application Configuration
app:
  name: AI Legacy Modernization Copilot
  version: 1.0.0
  max-upload-size-mb: 1000
  allowed-artifact-types: jar,war,xml,properties,gradle,maven,java
  temp-directory: ${TEMP_UPLOAD_DIR:/tmp/ai-legacy-copilot}
  output-directory: ${OUTPUT_DIR:/var/ai-legacy-copilot/output}
  
# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
